<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Warframe Profile Extension Options</title>
    <link rel="stylesheet" href="src/options.css" />
  </head>
  <body class="options">
    <main>
      <h1>Warframe Profile Extension</h1>
      <p class="lede">Manage the Warframe platform and the trusted sites that may request profile data.</p>

      <label>
        Platform
        <select id="platform">
          <option value="">Choose platform</option>
        </select>
      </label>

      <label>
        Captured gid
        <input id="accountId" readonly placeholder="Log in to warframe.com" />
      </label>

      <section class="trusted-sites" aria-labelledby="trustedSitesTitle">
        <h2 id="trustedSitesTitle">Trusted sites</h2>
        <div id="trustedSites" class="trusted-site-list"></div>
        <div class="add-site">
          <input id="siteInput" placeholder="wf-tracker.com" spellcheck="false" />
          <button id="addSite" type="button">Add</button>
        </div>
      </section>

      <div id="status" role="status"></div>

      <div class="actions">
        <button id="refreshGid" type="button">Refresh gid</button>
        <button id="save" type="button">Save</button>
      </div>
    </main>
    <script type="module" src="src/options-ui.js"></script>
  </body>
</html>
