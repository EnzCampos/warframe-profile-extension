name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test and build extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test and build
        run: npm run ci

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/*.zip
          if-no-files-found: error

  publish-placeholder:
    name: Chrome Web Store publish placeholder
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Placeholder
        run: |
          echo "Chrome Web Store publishing is intentionally not configured yet."
          echo "Later, replace this step with the Chrome Web Store upload/publish command and required secrets."
